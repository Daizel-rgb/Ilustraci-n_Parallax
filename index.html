<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Composición de Paralaje 3D Interactivo</title>

    <link rel="icon" href="img/Logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="slyle.css">
</head>
<body>

    <div id="loader-wrapper">
        <div class="loader-container">
            <div class="loader-progress"></div>
            <div class="loader-percentage" id="load-percentage">0%</div>
        </div>
    </div>
    
    <div class="parallax-scene" id="parallaxScene">
        <div class="layer layer0 layer-bg"></div>
        <div class="layer layer1 layer-bg"></div>
        <div class="layer layer2 layer-bg"></div>
        <div class="layer layer3 layer-bg"></div>
        <div class="layer layer4 layer-bg"></div>
        <div class="layer layer5 layer-bg"></div>
        <div class="layer layer6 layer-bg"></div>
        <div class="layer layer7 layer-bg"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
